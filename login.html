<input id="email">
<input id="senha" type="password">
<button onclick="login()">Entrar</button>

<script>
async function login(){
  const res = await fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      acao:"login",
      email:email.value,
      senha:senha.value
    })
  });

  const data = await res.json();

  if(data.ok){
    localStorage.token = data.token;
    location.href = "app.html";
  }else{
    alert("Erro login");
  }
}
</script>
