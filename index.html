<h2>Registro de Ponto</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="baterPonto('Entrada')">Entrada</button>
<button onclick="baterPonto('Saída')">Saída</button>

<p id="status"></p>

<script>
const url = "SUA_URL_WEB_APP";

function baterPonto(tipo){

  navigator.geolocation.getCurrentPosition(async pos => {

    const payload = {
      email: document.getElementById("email").value,
      senha: document.getElementById("senha").value,
      tipo: tipo,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      precisao: pos.coords.accuracy,
      endereco: "",
      ip: "",
      userAgent: navigator.userAgent
    };

    const res = await fetch(url, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.status === "ok"){
      document.getElementById("status").innerText =
        data.dentroArea
        ? "✅ Ponto registrado dentro da área"
        : "⚠️ Fora da área (" + Math.round(data.distancia) + "m)";
    } else {
      document.getElementById("status").innerText = data.msg;
    }

  });
}
</script>
